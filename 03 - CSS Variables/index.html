<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>

  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input id="blur" type="range" name="blur" min="0" max="50" value="10" data-sizing="px">

    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="cyan">

    <label for="rotationX">Rotation X:</label>
    <input id="rotationX" type="range" name="rotationX" min="0" max="360" value="0" data-sizing="deg">

    <label for="rotationY">Rotation Y:</label>
    <input id="rotationY" type="range" name="rotationY" min="0" max="360" value="0" data-sizing="deg">

    <label for="rotationZ">Rotation Z:</label>
    <input id="rotationZ" type="range" name="rotationZ" min="0" max="360" value="0" data-sizing="deg">

    <label for="scale">Scale:</label>
    <input id="scale" type="range" name="scale" step = "0.001" min="0" max="1" value="0.5">
  </div>

  <img src="https://img.pikbest.com/wp/202405/color-scheme-vibrant-3d-geometric-background-featuring-a-diversity-of-random-cubes-and-cool-blue_9844783.jpg!w700wp">

  <style>
    
    :root {
      --spacing: 10px;
      --base: cyan;
      --blur: 5px;
      --rotationX: 0deg;
      --rotationY: 0deg;
      --rotationZ: 0deg;
      --scale: 1;
    }
    
    img{
      padding: var(--spacing);
      background-color: var(--base);
      filter: blur(var(--blur));
      transform: perspective(700px) scale(var(--scale)) rotateX(var(--rotationX)) rotateY(var(--rotationY)) rotateZ(var(--rotationZ));
    }
    
    .hl{
      color: var(--base);
    }
    
    /*
      misc styles, nothing to do with CSS variables
    */

    body {
      text-align: center;
      background: #193549;
      color: white;
      font-family: 'helvetica neue', sans-serif;
      font-weight: 100;
      font-size: 50px;
    }

    .controls {
      margin-bottom: 50px;
    }

    input {
      width: 100px;
    }
  </style>

  <script>
    var inputs = document.querySelectorAll('.controls input');
    
    function handleUpdate(){
      const suffix = this.dataset.sizing || "";
      document.documentElement.style.setProperty(`--${this.name}`, this.value + suffix);
    }

    inputs.forEach(input => 
    {
      input.addEventListener('input', handleUpdate);
    });
  </script>

</body>
</html>
